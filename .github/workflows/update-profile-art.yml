name: Update profile art

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install renderer dependencies
        run: pip install -r scripts/requirements.txt
      - name: Fetch contribution data
        env:
          GH_PROFILE_USER: omarkhaledfg
        run: python scripts/fetch_contributions.py
      - name: Render contribution heatmap
        run: python scripts/render_heatmap_svg.py
      - name: Commit updated artwork
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          git diff --cached --quiet || git commit -m "chore: update contribution heatmap"
          git push
